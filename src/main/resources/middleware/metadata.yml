middleware:
  metadata:
    profiles:
      - profileId: PROFILE_1
        sourceSystem: HQ
        delivery:

          outputFolder: D:/Xcenter/inbound

          filePrefix: ORACLE_

          extension: csv

          delimiter:

          includeHeader: true

          includeTrailer: true

          trailerTemplate: "TRAILER||RECORD_COUNT|{count}"

        tables:
          - sourceTable: HQ_Price_Master
            targetTable: MNT
            fields:
              - sourceField: itemId
                targetField: ITEM
                dataType: STRING
                required: true

              - sourceField: price
                targetField: PRICE
                dataType: NUMBER
                required: true

              - sourceField: location
                targetField: SHOP
                dataType: STRING

              - sourceField: status
                targetField: STATUS
                dataType: NUMBER
                xrefDictionary:
                  "true": "1"
                  "false": "0"
